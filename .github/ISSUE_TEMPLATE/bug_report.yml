name: Bug report
description: Something isn't tracking correctly or the plugin misbehaves
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please **do not** report security vulnerabilities here — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact steps, ideally on a clean site.
      placeholder: |
        1. Go to …
        2. Click …
        3. Observe … (e.g. no /api/send request, wrong event name)
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: WordPress, PHP, Umami, Stats Umami, and any relevant integration plugin + version.
      placeholder: "WP 7.0.2, PHP 8.2, Umami 3.2.0, Stats Umami 1.1.0, WooCommerce 10.9.4"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Console errors, the tracked request payload, screenshots, etc.
    validations:
      required: false
